name: Update agenda

permissions: 
  contents: write

env:
  THIJS: ${{ secrets.THIJS }}
  LUCAS: ${{ secrets.LUCAS }}
  MARNIX: ${{ secrets.MARNIX }}
  NIELS: ${{ secrets.NIELS }}

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests icalendar

      - run: python merge.py

      - name: Commit nieuwe agenda
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add merged.ics

          git diff --cached --quiet && exit 0
          
          git commit -m "Update agenda" || exit 0
          git push
